<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Al Qalam Quran Academy | Online Quran Learning</title>
<meta name="description" content="Al Qalam Quran Academy – Professional Online Quran Learning with certified teachers worldwide."/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;
  --gold2:#e8c97a;
  --gold3:#a07830;
  --gold-light:rgba(201,168,76,0.15);
  --dark:#070d14;
  --dark2:#0c1520;
  --dark3:#111e2e;
  --navy:#0d1f35;
  --navy2:#162840;
  --teal:#0a5c5c;
  --teal2:#0d7070;
  --light:#f5efe0;
  --white:#ffffff;
  --text-dim:rgba(245,239,224,0.75);
  --text-muted:rgba(245,239,224,0.45);
  --border:rgba(201,168,76,0.18);
  --border-h:rgba(201,168,76,0.45);
  --shadow:0 20px 60px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--dark);
  color:var(--light);
  font-family:'Raleway',sans-serif;
  overflow-x:hidden;
  line-height:1.7;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:2px;}

/* ===== CANVAS BG ===== */
#quran-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;opacity:0.55;
}

/* ===== ANIMATED ARABIC LETTERS ===== */
.arabic-rain{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;overflow:hidden;
}
.ar-drop{
  position:absolute;
  font-family:'Noto Naskh Arabic',serif;
  color:rgba(201,168,76,0.07);
  font-size:28px;
  user-select:none;
  animation:arRain linear infinite;
}
@keyframes arRain{
  0%{transform:translateY(-60px);opacity:0;}
  5%{opacity:1;}
  95%{opacity:0.7;}
  100%{transform:translateY(110vh);opacity:0;}
}

/* ===== GEOMETRIC OVERLAY ===== */
.geo-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 15% 15%,rgba(13,31,53,0.6) 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 85% 85%,rgba(10,92,92,0.18) 0%,transparent 55%),
    radial-gradient(ellipse 90% 40% at 50% 110%,rgba(12,21,32,0.8) 0%,transparent 65%);
}

/* ===== NAV ===== */
nav{
  position:fixed;top:0;left:0;width:100%;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:72px;
  background:rgba(7,13,20,0.96);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  animation:slideDown .7s ease both;
}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

.nav-logo{
  display:flex;align-items:center;gap:13px;
  text-decoration:none;cursor:pointer;
}
.nav-logo-icon{
  width:44px;height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Naskh Arabic',serif;
  font-size:22px;color:var(--dark);font-weight:700;
  box-shadow:0 0 22px rgba(201,168,76,0.4);
  flex-shrink:0;
}
.nav-logo-text{
  font-family:'Cinzel',serif;
  font-size:14px;font-weight:700;
  color:var(--gold);
  letter-spacing:1.5px;
  line-height:1.25;
}
.nav-logo-text small{
  display:block;
  font-family:'Raleway',sans-serif;
  font-size:8.5px;font-weight:500;
  letter-spacing:3.5px;text-transform:uppercase;
  color:var(--text-muted);
}

.nav-links{display:flex;align-items:center;gap:32px;}
.nav-links a{
  color:var(--text-dim);text-decoration:none;
  font-size:10.5px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;
  transition:.3s;position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-5px;left:0;
  width:0;height:1px;background:var(--gold);transition:.3s;
}
.nav-links a:hover{color:var(--gold);}
.nav-links a:hover::after{width:100%;}

.nav-cta{
  padding:9px 22px;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  color:var(--dark)!important;
  border-radius:3px;font-weight:700!important;
  letter-spacing:1.5px!important;
  box-shadow:0 4px 18px rgba(201,168,76,0.3);
  transition:.3s!important;
}
.nav-cta:hover{box-shadow:0 6px 28px rgba(201,168,76,0.5);transform:translateY(-2px)!important;}
.nav-cta::after{display:none!important;}

.nav-toggle{
  display:none;flex-direction:column;gap:5px;
  cursor:pointer;padding:6px;
}
.nav-toggle span{display:block;width:22px;height:2px;background:var(--gold);border-radius:2px;transition:.3s;}

/* ===== HERO ===== */
#hero{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:130px 5% 90px;
  overflow:hidden;
}

/* Islamic geometric rings */
.hero-ring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(201,168,76,0.1);
  pointer-events:none;top:50%;left:50%;
  transform:translate(-50%,-50%);
}
.ring1{width:750px;height:750px;border-color:rgba(201,168,76,0.07);animation:spinR 100s linear infinite;}
.ring2{width:580px;height:580px;border-color:rgba(201,168,76,0.1);animation:spinL 70s linear infinite;}
.ring3{width:380px;height:380px;border-color:rgba(201,168,76,0.06);animation:spinR 50s linear infinite;border-style:dashed;}
@keyframes spinR{to{transform:translate(-50%,-50%) rotate(360deg);}}
@keyframes spinL{to{transform:translate(-50%,-50%) rotate(-360deg);}}

.hero-badge{
  display:inline-flex;align-items:center;gap:9px;
  padding:8px 20px;
  border:1px solid rgba(201,168,76,0.35);
  border-radius:30px;
  background:rgba(201,168,76,0.08);
  font-size:9.5px;font-weight:700;
  letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);
  margin-bottom:30px;
  animation:fadeUp .8s ease .2s both;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}

.hero-bismillah{
  font-family:'Noto Naskh Arabic',serif;
  font-size:clamp(26px,4.5vw,54px);
  color:var(--gold2);
  text-shadow:0 0 60px rgba(201,168,76,0.55),0 0 120px rgba(201,168,76,0.2);
  margin-bottom:20px;
  line-height:1.6;
  animation:glowFade 1.2s ease .4s both;
  position:relative;z-index:1;
}
@keyframes glowFade{from{opacity:0;filter:blur(8px)}to{opacity:1;filter:blur(0)}}

.hero h1{
  font-family:'Cinzel',serif;
  font-size:clamp(30px,5.5vw,74px);
  font-weight:900;line-height:1.1;
  color:var(--white);
  margin-bottom:10px;
  animation:fadeUp .9s ease .6s both;
  position:relative;z-index:1;
}
.hero h1 em{
  font-style:normal;display:block;
  background:linear-gradient(135deg,var(--gold3) 0%,var(--gold) 40%,var(--gold2) 60%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200% auto;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{to{background-position:200% center;}}

.hero-sub{
  font-size:clamp(13px,1.6vw,16px);
  color:var(--text-dim);font-weight:400;
  letter-spacing:.8px;
  margin-bottom:42px;
  max-width:520px;
  animation:fadeUp .9s ease .8s both;
  position:relative;z-index:1;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}

.hero-btns{
  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  animation:fadeUp .9s ease 1s both;
  position:relative;z-index:1;
}

.btn-primary{
  display:inline-flex;align-items:center;gap:10px;
  padding:15px 38px;
  background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));
  color:var(--dark);
  border:none;border-radius:3px;
  font-family:'Raleway',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  text-decoration:none;cursor:pointer;
  transition:.3s;
  box-shadow:0 8px 32px rgba(201,168,76,0.38);
  position:relative;overflow:hidden;
}
.btn-primary::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
  transition:.6s;
}
.btn-primary:hover::before{left:100%;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 14px 42px rgba(201,168,76,0.52);}

.btn-outline{
  display:inline-flex;align-items:center;gap:10px;
  padding:15px 38px;
  background:transparent;
  color:var(--light);
  border:1px solid rgba(245,239,224,0.28);border-radius:3px;
  font-family:'Raleway',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  text-decoration:none;cursor:pointer;transition:.3s;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-3px);}

.hero-scroll{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:fadeUp 1s ease 1.5s both;z-index:1;
}
.hero-scroll span{font-size:8.5px;letter-spacing:3.5px;color:var(--text-muted);text-transform:uppercase;}
.scroll-line{width:1px;height:52px;background:rgba(201,168,76,0.18);position:relative;overflow:hidden;}
.scroll-line::after{
  content:'';position:absolute;top:0;left:0;width:100%;height:40%;
  background:var(--gold);
  animation:scrollDrop 2.2s ease-in-out infinite;
}
@keyframes scrollDrop{
  0%{top:-50%;opacity:0}8%{opacity:1}88%{opacity:1}100%{top:110%;opacity:0}
}

/* ===== VERSE BANNER ===== */
.verse-banner{
  position:relative;z-index:2;
  padding:52px 5%;
  background:linear-gradient(135deg,rgba(10,92,92,0.22),rgba(13,31,53,0.3));
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  text-align:center;overflow:hidden;
}
.verse-banner::before{
  content:'';position:absolute;top:0;left:-200%;width:600%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.04),transparent);
  animation:sheen 8s linear infinite;
}
@keyframes sheen{to{left:100%;}}
.vb-arabic{
  font-family:'Noto Naskh Arabic',serif;
  font-size:clamp(18px,3.5vw,38px);
  color:var(--gold2);margin-bottom:10px;line-height:1.7;
  position:relative;z-index:1;
}
.vb-trans{
  font-size:13.5px;color:var(--text-dim);
  font-style:italic;font-weight:300;
  position:relative;z-index:1;
}
.vb-ref{
  display:inline-block;margin-top:8px;
  font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(201,168,76,0.65);
  border:1px solid rgba(201,168,76,0.2);
  padding:4px 14px;border-radius:20px;
  position:relative;z-index:1;
}

/* ===== STATS ===== */
.stats-section{
  position:relative;z-index:2;
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.stat-cell{
  padding:46px 20px;text-align:center;
  border-right:1px solid var(--border);
  position:relative;overflow:hidden;transition:.3s;
}
.stat-cell:last-child{border-right:none;}
.stat-cell::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  transform:scaleX(0);transition:.4s;
}
.stat-cell:hover::after{transform:scaleX(1);}
.stat-cell:hover{background:rgba(201,168,76,0.04);}
.stat-num{
  font-family:'Cinzel',serif;
  font-size:clamp(28px,4vw,48px);
  font-weight:700;color:var(--gold);
  display:block;line-height:1;margin-bottom:8px;
}
.stat-label{
  font-size:9.5px;letter-spacing:3px;text-transform:uppercase;
  color:var(--text-muted);font-weight:500;
}

/* ===== SECTIONS ===== */
section{
  position:relative;z-index:2;
  padding:110px 5%;text-align:center;
}
.eyebrow{
  display:inline-block;
  font-size:9.5px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);margin-bottom:13px;
  padding:5px 18px;
  border:1px solid rgba(201,168,76,0.22);
  border-radius:20px;
  background:rgba(201,168,76,0.07);
}
.section-title{
  font-family:'Cinzel',serif;
  font-size:clamp(24px,4vw,44px);
  font-weight:700;color:var(--white);
  margin-bottom:14px;line-height:1.2;
}
.section-desc{
  font-size:14.5px;color:var(--text-dim);
  max-width:560px;margin:0 auto 14px;font-weight:400;line-height:1.8;
}
.divider-ornament{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin:0 auto 64px;max-width:240px;
}
.div-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold3));}
.div-line.r{background:linear-gradient(to left,transparent,var(--gold3));}
.div-sym{
  font-family:'Noto Naskh Arabic',serif;
  font-size:24px;color:var(--gold);opacity:.65;
}

/* ===== COURSES ===== */
#courses{background:linear-gradient(180deg,var(--dark) 0%,var(--dark2) 100%);}
.courses-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:18px;max-width:1200px;margin:0 auto;
}
.course-card{
  background:linear-gradient(160deg,rgba(13,31,53,0.85),rgba(11,19,30,0.9));
  border:1px solid var(--border);
  border-radius:6px;padding:36px 24px 28px;
  text-align:left;position:relative;overflow:hidden;
  transition:.4s cubic-bezier(.25,.8,.25,1);
  cursor:default;
}
.course-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold3),var(--gold2));
  transform:scaleX(0);transform-origin:left;transition:.4s;
}
.course-card:hover::before{transform:scaleX(1);}
.course-card:hover{
  background:linear-gradient(160deg,rgba(22,40,64,0.9),rgba(13,31,53,0.95));
  border-color:var(--border-h);
  transform:translateY(-8px);
  box-shadow:0 28px 60px rgba(0,0,0,0.45),0 0 40px rgba(10,92,92,0.12);
}
.c-icon{
  width:50px;height:50px;border-radius:8px;
  background:linear-gradient(135deg,rgba(10,92,92,0.35),rgba(201,168,76,0.12));
  border:1px solid rgba(201,168,76,0.2);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;
  font-family:'Noto Naskh Arabic',serif;
  font-size:24px;color:var(--gold);
}
.course-card h3{
  font-family:'Cinzel',serif;
  font-size:15.5px;font-weight:700;
  color:var(--white);margin-bottom:10px;
}
.course-card p{
  font-size:13px;color:var(--text-dim);
  line-height:1.8;font-weight:400;
}
.c-tag{
  display:inline-block;margin-top:18px;
  padding:4px 13px;
  border:1px solid rgba(201,168,76,0.25);
  border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:rgba(201,168,76,0.7);
}

/* ===== WHY US ===== */
#why{
  background:linear-gradient(180deg,var(--dark2) 0%,var(--dark3) 50%,var(--dark2) 100%);
}
.why-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;max-width:1100px;margin:0 auto;
}
.why-card{
  padding:36px 26px;
  border:1px solid var(--border);border-radius:6px;
  background:rgba(7,13,20,0.65);
  text-align:left;transition:.35s;position:relative;overflow:hidden;
}
.why-card::after{
  content:'';position:absolute;bottom:0;left:0;width:100%;height:100%;
  background:linear-gradient(135deg,rgba(10,92,92,0.07),transparent);
  opacity:0;transition:.35s;
}
.why-card:hover::after{opacity:1;}
.why-card:hover{
  border-color:var(--border-h);
  transform:translateY(-5px);
  box-shadow:0 22px 52px rgba(0,0,0,0.35);
}
.w-number{
  font-family:'Cinzel',serif;
  font-size:44px;font-weight:900;
  color:rgba(201,168,76,0.1);
  line-height:1;margin-bottom:12px;
}
.w-icon{
  width:46px;height:46px;border-radius:8px;
  background:rgba(10,92,92,0.22);
  border:1px solid rgba(10,92,92,0.4);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
  font-family:'Noto Naskh Arabic',serif;
  font-size:22px;color:var(--gold);
  position:relative;z-index:1;
}
.why-card h3{
  font-family:'Cinzel',serif;
  font-size:14.5px;font-weight:700;
  color:var(--white);margin-bottom:9px;
  position:relative;z-index:1;
}
.why-card p{
  font-size:13px;color:var(--text-dim);
  line-height:1.8;font-weight:400;
  position:relative;z-index:1;
}

/* ===== TEACHERS ===== */
#teachers{background:linear-gradient(180deg,var(--dark2) 0%,var(--dark) 100%);}
.teachers-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:18px;max-width:960px;margin:0 auto;
}
.teacher-card{
  border:1px solid var(--border);border-radius:6px;
  padding:36px 18px;
  background:linear-gradient(160deg,rgba(13,31,53,0.6),rgba(7,13,20,0.7));
  text-align:center;transition:.35s;
}
.teacher-card:hover{
  border-color:var(--border-h);
  transform:translateY(-6px);
  background:linear-gradient(160deg,rgba(22,40,64,0.7),rgba(13,31,53,0.8));
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}
.t-avatar{
  width:78px;height:78px;border-radius:50%;
  background:linear-gradient(135deg,rgba(10,92,92,0.55),rgba(22,40,64,0.9));
  border:2px solid rgba(201,168,76,0.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  font-family:'Noto Naskh Arabic',serif;
  font-size:30px;color:var(--gold);
  box-shadow:0 0 28px rgba(201,168,76,0.15);
}
.teacher-card h3{
  font-family:'Cinzel',serif;
  font-size:14px;font-weight:700;color:var(--white);margin-bottom:6px;
}
.teacher-card p{
  font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-muted);
}
.t-badge{
  display:inline-block;margin-top:13px;
  padding:4px 13px;
  border:1px solid rgba(10,92,92,0.45);border-radius:20px;
  font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(180,220,215,0.7);
  background:rgba(10,92,92,0.12);
}

/* ===== TRIAL ===== */
#trial{
  background:
    linear-gradient(135deg,rgba(10,92,92,0.22),rgba(22,40,64,0.4)),
    var(--dark2);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.trial-box{
  max-width:680px;margin:0 auto;
  padding:62px 44px;
  border:1px solid rgba(201,168,76,0.18);
  border-radius:8px;
  background:rgba(7,13,20,0.55);
  position:relative;overflow:hidden;
}
.trial-box::before{
  content:'';position:absolute;
  top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at center,rgba(201,168,76,0.05),transparent 60%);
  animation:glow 4.5s ease-in-out infinite;
}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}
.trial-arabic{
  font-family:'Noto Naskh Arabic',serif;
  font-size:clamp(22px,4vw,44px);
  color:var(--gold);margin-bottom:10px;line-height:1.6;
  position:relative;z-index:1;
  text-shadow:0 0 40px rgba(201,168,76,0.4);
}
.trial-trans{
  font-size:13px;color:var(--text-dim);font-style:italic;font-weight:300;
  margin-bottom:28px;position:relative;z-index:1;
}
.trial-box h2{
  font-family:'Cinzel',serif;
  font-size:clamp(20px,3.5vw,34px);
  font-weight:700;color:var(--white);
  margin-bottom:10px;position:relative;z-index:1;
}
.trial-note{font-size:12px;color:var(--text-muted);margin-bottom:30px;position:relative;z-index:1;}
.trial-features{
  display:flex;gap:24px;flex-wrap:wrap;justify-content:center;
  margin-bottom:32px;position:relative;z-index:1;
}
.trial-feature{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--text-dim);font-weight:500;
}
.tf-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* ===== CONTACT ===== */
#contact{background:var(--dark);}
.contact-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:16px;max-width:820px;margin:0 auto;
}
.contact-card{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:36px 20px;
  border:1px solid var(--border);border-radius:6px;
  background:linear-gradient(160deg,rgba(13,31,53,0.5),rgba(7,13,20,0.6));
  text-align:center;transition:.3s;
}
.contact-card:hover{
  border-color:var(--border-h);
  background:linear-gradient(160deg,rgba(22,40,64,0.55),rgba(13,31,53,0.65));
  transform:translateY(-4px);
  box-shadow:0 18px 46px rgba(0,0,0,0.3);
}
